# Nixpacks configuration for Railway deployment
# Ensures FFmpeg and other audio dependencies are installed

[phases.setup]
nixPkgs = ["ffmpeg", "libsndfile", "sox", "libsox-fmt-all"]

[phases.install]
cmds = ["pip install --upgrade pip", "pip install -r requirements.txt"]

[start]
cmd = "python app.py"

[variables]
PYTHONUNBUFFERED = "1"
# Force torchaudio to use sox_io backend (more compatible in containers)
TORCHAUDIO_USE_BACKEND_DISPATCHER = "1"

